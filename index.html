<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>凱 &amp; 涵 家庭帳本 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F5F3EE;--surface:#FFF;--surface2:#F0EDE6;--border:#E2DDD4;
  --text:#1C1A17;--text2:#7A7468;--text3:#B0AA9F;
  --accent:#D85A30;--accent-light:#FAECE7;
  --green:#1D9E75;--green-light:#E1F5EE;
  --blue:#378ADD;--blue-light:#E6F1FB;
  --amber:#BA7517;--amber-light:#FAEEDA;
  --pink:#993556;--pink-light:#FBEAF0;
  --kai:#378ADD;--kai-light:#E6F1FB;
  --han:#993556;--han-light:#FBEAF0;
  --mono:'DM Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

/* ── Header ── */
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 2rem;display:flex;align-items:center;justify-content:space-between;height:60px;position:sticky;top:0;z-index:100;}
.logo{font-size:15px;font-weight:700;letter-spacing:-0.02em;display:flex;align-items:center;gap:10px;}
.logo-icon{width:30px;height:30px;background:linear-gradient(135deg,var(--kai),var(--han));border-radius:8px;display:flex;align-items:center;justify-content:center;color:white;font-size:13px;font-weight:700;}
.avatar{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:50%;font-size:11px;font-weight:700;color:white;}
.av-kai{background:var(--kai);}
.av-han{background:var(--han);}

/* ── Grocery Deal Banner ── */
#deal-bar{display:flex;align-items:center;gap:10px;padding:10px 2rem;background:var(--surface);border-bottom:1px solid var(--border);}
#deal-bar.hidden{display:none;}
.deal-btn{display:inline-flex;align-items:center;gap:7px;background:linear-gradient(135deg,#4caf7d,#2a9a5a);color:white;border:none;padding:7px 14px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;box-shadow:0 2px 6px #4caf7d44;}
.deal-btn:hover{opacity:0.88;}
.deal-badge{background:rgba(255,255,255,0.3);border-radius:10px;padding:1px 7px;font-size:12px;font-weight:700;}
.deal-hint{font-size:12px;color:var(--text2);}
.deal-hint b{color:var(--text);}

/* ── Grocery Modal ── */
#deal-modal{display:none;position:fixed;inset:0;z-index:500;align-items:flex-start;justify-content:center;padding-top:80px;}
#deal-modal.open{display:flex;}
#deal-backdrop{position:absolute;inset:0;background:rgba(0,0,0,0.35);}
#deal-box{position:relative;background:var(--surface);border-radius:14px;width:480px;max-width:95vw;max-height:70vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 12px 40px rgba(0,0,0,0.18);}
#deal-box-header{padding:16px 20px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
#deal-box-title{font-size:15px;font-weight:700;}
#deal-close{background:none;border:none;font-size:20px;cursor:pointer;color:var(--text3);line-height:1;padding:2px 6px;}
#deal-close:hover{color:var(--text);}
#deal-box-body{overflow-y:auto;padding:14px 20px 18px;}
.deal-store-label{font-size:11px;font-weight:700;color:var(--text3);letter-spacing:0.07em;text-transform:uppercase;margin:12px 0 6px;}
.deal-store-label:first-child{margin-top:0;}
.deal-item{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;background:var(--bg);border-radius:8px;margin-bottom:4px;font-size:13px;cursor:pointer;transition:background 0.1s;text-decoration:none;color:inherit;}
.deal-item:hover{background:#e8f4e8;}
.deal-item-name{font-weight:500;}
.deal-item-right{display:flex;align-items:center;gap:7px;}
.deal-item-price{font-weight:700;color:#2a7a4a;font-family:var(--mono);}
.deal-item-orig{color:var(--text3);text-decoration:line-through;font-size:11px;font-family:var(--mono);}
.deal-item-pct{background:#e8f4e8;color:#2a7a4a;font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px;}
.deal-empty{font-size:13px;color:var(--text2);text-align:center;padding:20px 0;}

/* ── Layout ── */
.layout{display:grid;grid-template-columns:210px 1fr;min-height:calc(100vh - 60px);}
.sidebar{background:var(--surface);border-right:1px solid var(--border);padding:1rem;display:flex;flex-direction:column;gap:2px;position:sticky;top:60px;height:calc(100vh - 60px);overflow-y:auto;}
.nav-section{font-size:10px;font-weight:700;color:var(--text3);letter-spacing:0.08em;text-transform:uppercase;padding:0 8px;margin:10px 0 4px;}
.nav-item{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:7px;font-size:13px;cursor:pointer;color:var(--text2);transition:all 0.12s;border:none;background:none;width:100%;text-align:left;font-family:inherit;}
.nav-item:hover{background:var(--bg);color:var(--text);}
.nav-item.active{background:var(--accent-light);color:var(--accent);font-weight:500;}
.nav-dot{width:8px;height:8px;border-radius:50%;background:var(--border);flex-shrink:0;transition:background 0.2s;}
.nav-item.active .nav-dot{background:var(--accent);}
.nav-item.has-data .nav-dot{background:var(--green);}
.nav-badge{margin-left:auto;font-size:10px;font-family:var(--mono);color:var(--text3);}
.nav-item.active .nav-badge{color:var(--accent);}

.main{overflow-y:auto;}
.panel{display:none;}.panel.active{display:block;}
.page-header{background:var(--surface);border-bottom:1px solid var(--border);padding:1.25rem 2rem;display:flex;align-items:center;justify-content:space-between;}
.page-title{font-size:20px;font-weight:700;letter-spacing:-0.02em;}
.page-sub{font-size:12px;color:var(--text3);margin-top:2px;}
.page-body{padding:1.5rem 2rem;}

/* ── Cards ── */
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:1.5rem;}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:1.5rem;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:1.5rem;margin-bottom:1.5rem;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.25rem;}
.card.kai-card{border-top:3px solid var(--kai);}
.card.han-card{border-top:3px solid var(--han);}
.card.settle-card{border:2px solid var(--amber);background:var(--amber-light);}
.card-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.07em;color:var(--text3);margin-bottom:8px;}
.card-value{font-family:var(--mono);font-size:20px;font-weight:500;}
.card-value.red{color:var(--accent);}
.card-value.green{color:var(--green);}
.card-value.kai{color:var(--kai);}
.card-value.han{color:var(--han);}
.card-value.amber{color:var(--amber);}
.card-sub{font-size:11px;color:var(--text2);margin-top:4px;}

/* ── Settlement box ── */
.settle-box{background:var(--amber-light);border:1px solid #FAC775;border-radius:12px;padding:1.25rem;margin-bottom:.75rem;display:flex;align-items:center;gap:1rem;}
.spend-breakdown{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:.8rem 1.25rem;margin-bottom:1.5rem;font-size:13px;}
.sb-row{display:flex;align-items:center;flex-wrap:wrap;gap:.4rem .2rem;}
.sb-label{color:var(--text2);font-size:12px;}
.sb-val{font-size:13px;font-weight:600;}
.kai-txt{color:var(--kai);}
.han-txt{color:var(--han);}
.settle-icon{font-size:24px;flex-shrink:0;}
.settle-text{font-size:14px;font-weight:500;}
.settle-amount{font-family:var(--mono);font-size:22px;font-weight:700;color:var(--amber);}

/* ── Year month grid ── */
.year-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:1.5rem;}
.month-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;cursor:pointer;transition:border-color 0.15s;}
.month-card:hover{border-color:var(--accent);}
.month-card-name{font-size:11px;font-weight:700;color:var(--text3);margin-bottom:4px;}
.month-card-total{font-family:var(--mono);font-size:14px;font-weight:500;color:var(--accent);}
.month-card-sub{font-size:10px;color:var(--text3);margin-top:3px;}
.month-card-bar{height:3px;border-radius:2px;background:var(--bg);margin-top:8px;overflow:hidden;}
.month-card-bar-fill{height:100%;border-radius:2px;background:var(--accent);}

/* ── Section ── */
.section{background:var(--surface);border:1px solid var(--border);border-radius:12px;margin-bottom:1.5rem;overflow:hidden;}
.section-header{padding:1rem 1.25rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.section-title{font-size:13px;font-weight:700;}
.section-body{padding:1.25rem;}

/* ── Bar chart ── */
.bar-list{display:flex;flex-direction:column;gap:10px;}
.bar-row{display:flex;align-items:center;gap:10px;}
.bar-cat{width:90px;font-size:12px;color:var(--text2);text-align:right;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.bar-track{flex:1;height:10px;background:var(--bg);border-radius:5px;overflow:hidden;}
.bar-fill{height:100%;border-radius:5px;transition:width 0.5s cubic-bezier(0.4,0,0.2,1);}
.bar-val{width:80px;font-size:11px;font-family:var(--mono);color:var(--text2);}

/* ── Table ── */
.tbl-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:13px;}
th{text-align:left;padding:9px 12px;font-size:10px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:var(--text3);border-bottom:1px solid var(--border);white-space:nowrap;}
td{padding:10px 12px;border-bottom:1px solid var(--border);vertical-align:middle;}
tbody tr:last-child td{border-bottom:none;}
tbody tr:hover td{background:var(--bg);}
.mono{font-family:var(--mono);}
.tbl-sub td{background:var(--bg);font-size:12px;color:var(--text2);}
.tbl-grand td{font-weight:700;}
.tbl-grand .mono{color:var(--accent);}

/* ── Badges ── */
.badge{display:inline-block;font-size:10px;font-weight:700;letter-spacing:0.03em;padding:3px 8px;border-radius:20px;white-space:nowrap;}
.b-veg{background:var(--green-light);color:#0F6E56;}
.b-meat{background:var(--accent-light);color:#993C1D;}
.b-snack{background:var(--amber-light);color:var(--amber);}
.b-drink{background:var(--blue-light);color:#185FA5;}
.b-eatout{background:var(--pink-light);color:var(--pink);}
.b-food{background:var(--green-light);color:#0F6E56;}
.b-daily{background:#F1EFE8;color:#5F5E5A;}
.b-tax{background:var(--surface2);color:var(--text3);}
.b-kai{background:var(--kai-light);color:var(--kai);}
.b-han{background:var(--han-light);color:var(--han);}
.b-shared{background:#F1EFE8;color:#5F5E5A;}

/* ── Who chip ── */
.who-chip{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;}
.who-kai{background:var(--kai-light);color:var(--kai);}
.who-han{background:var(--han-light);color:var(--han);}
.who-shared{background:#F1EFE8;color:#5F5E5A;}

/* ── Form ── */
.form-section{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.5rem;margin-bottom:1.5rem;}
.fsec-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.07em;color:var(--text3);margin-bottom:1rem;display:flex;align-items:center;gap:8px;}
.form-divider{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.07em;color:var(--text3);margin:1rem 0 0.75rem;padding-bottom:0.5rem;border-bottom:1px solid var(--border);}
.frow{display:grid;gap:12px;align-items:end;margin-bottom:12px;}
.fr5{grid-template-columns:130px 1fr 80px 1fr 120px;}
.fr3{grid-template-columns:1fr 1fr 1fr;}
.fr2{grid-template-columns:1fr 1fr;}
.fr4{grid-template-columns:1fr 1fr 1fr 1fr;}
.fgroup{display:flex;flex-direction:column;gap:5px;}
label.fl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:var(--text3);}

input[type=text],input[type=number],input[type=date],select{
  padding:8px 10px;border:1px solid var(--border);border-radius:7px;
  font-family:inherit;font-size:13px;background:var(--bg);color:var(--text);
  outline:none;transition:border-color 0.15s;width:100%;
}
input:focus,select:focus{border-color:var(--accent);background:white;}
input.formula{font-family:var(--mono);}

.formula-hint{font-size:11px;font-family:var(--mono);color:var(--green);position:absolute;top:100%;left:0;margin-top:2px;white-space:nowrap;}
.fgroup{position:relative;}
.formula-hint.err{color:var(--accent);}

/* Who toggle */
.who-toggle{display:flex;gap:6px;}
.who-btn{padding:8px 14px;border-radius:7px;border:1.5px solid var(--border);background:var(--bg);font-family:inherit;font-size:13px;font-weight:500;cursor:pointer;transition:all 0.12s;color:var(--text2);}
.who-btn.sel-kai{border-color:var(--kai);background:var(--kai-light);color:var(--kai);}
.who-btn.sel-han{border-color:var(--han);background:var(--han-light);color:var(--han);}
.who-btn.sel-shared{border-color:#888;background:#F1EFE8;color:#5F5E5A;}

/* Tax row */
.tax-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:12px 14px;background:var(--bg);border-radius:8px;border:1px solid var(--border);margin-bottom:12px;}
.tax-row label.fl{color:var(--amber);}

/* Calc preview */
.calc-preview{background:var(--green-light);border:1px solid #9FE1CB;border-radius:7px;padding:8px 12px;font-size:12px;font-family:var(--mono);color:var(--green);margin-bottom:10px;}

/* Income form */
.income-grid{display:grid;grid-template-columns:1fr 1fr;gap:1.5rem;margin-bottom:1.5rem;}
.income-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.25rem;}
.income-card.kai-card{border-top:3px solid var(--kai);}
.income-card.han-card{border-top:3px solid var(--han);}
.income-title{font-size:13px;font-weight:700;margin-bottom:1rem;display:flex;align-items:center;gap:8px;}
.income-item{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px;}
.income-item:last-child{border-bottom:none;}
.income-total{display:flex;justify-content:space-between;align-items:center;padding:10px 0 0;font-weight:700;font-size:14px;}

.btn{padding:9px 20px;border-radius:7px;font-family:inherit;font-size:13px;font-weight:500;cursor:pointer;transition:all 0.12s;border:none;}
.btn-primary{background:var(--accent);color:white;}
.btn-primary:hover{background:#C04A22;}
.btn-secondary{background:var(--surface2);color:var(--text2);border:1px solid var(--border);}
.btn-secondary:hover{background:var(--border);}
.btn-sm{padding:4px 9px;border-radius:5px;font-size:10px;font-weight:700;cursor:pointer;border:1px solid var(--border);background:none;color:var(--text3);font-family:inherit;opacity:0;transition:opacity 0.12s;}
tr:hover .btn-sm{opacity:1;}
.btn-sm:hover{background:#FCEBEB;color:var(--accent);border-color:#F0C4B3;}
.btn-sm.edit-btn:hover{background:var(--blue-light);color:var(--blue);border-color:#BDD9F5;}
.hdr-btn{padding:6px 14px;border-radius:6px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--bg);color:var(--text2);font-family:inherit;}
.hdr-btn:hover{background:var(--border);}

.cat-2col{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.cat-item{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;background:var(--bg);border-radius:7px;font-size:12px;}
.cat-amt{font-family:var(--mono);font-weight:500;font-size:11px;}
.empty-state{text-align:center;padding:2.5rem;color:var(--text3);font-size:13px;}

.toast{position:fixed;bottom:2rem;right:2rem;background:var(--text);color:white;padding:11px 18px;border-radius:9px;font-size:13px;font-weight:500;opacity:0;transform:translateY(8px);transition:all 0.2s;pointer-events:none;z-index:999;}
.toast.show{opacity:1;transform:translateY(0);}

/* ── Modal ── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:200;align-items:center;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:var(--surface);border-radius:16px;padding:2rem;width:680px;max-width:94vw;max-height:90vh;overflow-y:auto;box-shadow:0 24px 64px rgba(0,0,0,0.22);}
.modal-title{font-size:16px;font-weight:700;margin-bottom:1.5rem;display:flex;align-items:center;gap:10px;}
.modal-footer{display:flex;gap:8px;margin-top:1.5rem;justify-content:flex-end;}

/* inline income action buttons */
.inc-actions{display:flex;gap:6px;align-items:center;}
.inc-btn{padding:3px 8px;border-radius:5px;font-size:10px;font-weight:700;cursor:pointer;border:1px solid var(--border);background:none;color:var(--text3);font-family:inherit;}
.inc-btn:hover{background:#FCEBEB;color:var(--accent);border-color:#F0C4B3;}
.inc-btn.edit:hover{background:var(--blue-light);color:var(--blue);border-color:#BDD9F5;}

/* ── Calendar view ── */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;padding:1rem;}
.cal-weekday{text-align:center;font-size:10px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:var(--text3);padding:4px 0;}
.cal-cell{min-height:72px;border-radius:8px;background:var(--bg);border:1px solid var(--border);padding:6px;cursor:default;transition:border-color 0.12s;position:relative;}
.cal-cell.has-exp{cursor:pointer;}
.cal-cell.has-exp:hover{border-color:var(--accent);}
.cal-cell.empty{background:transparent;border-color:transparent;}
.cal-cell.today{border-color:var(--accent);background:var(--accent-light);}
.cal-day-num{font-size:11px;font-weight:700;color:var(--text3);margin-bottom:3px;}
.cal-cell.today .cal-day-num{color:var(--accent);}
.cal-day-total{font-size:11px;font-family:var(--mono);font-weight:500;color:var(--text);}
.cal-day-items{margin-top:3px;display:flex;flex-direction:column;gap:2px;}
.cal-day-dot{font-size:9px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3;}
.cal-popup{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:1rem;margin:0 1rem 1rem;box-shadow:0 4px 16px rgba(0,0,0,0.1);}
.cal-popup-title{font-size:12px;font-weight:700;margin-bottom:8px;color:var(--text2);}
.cal-popup-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--border);font-size:12px;}
.cal-popup-row:last-child{border-bottom:none;}
.cal-popup-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding-right:8px;}
.cal-popup-amt{font-family:var(--mono);font-size:11px;flex-shrink:0;}
.view-toggle{display:flex;gap:4px;}
.view-toggle .hdr-btn{padding:5px 12px;}
.view-toggle .hdr-btn.active{background:var(--accent);color:white;border-color:var(--accent);}

/* ── Search ── */
.search-input{padding:6px 10px;border:1px solid var(--border);border-radius:6px;font-size:12px;background:var(--bg);color:var(--text);width:160px;font-family:inherit;}
.search-input:focus{border-color:var(--accent);background:white;outline:none;}

/* ── Settled badge ── */
.settled-btn{padding:5px 12px;border-radius:6px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--bg);color:var(--text2);font-family:inherit;}
.settled-btn.settled{background:var(--green-light);color:var(--green);border-color:var(--green);}
.paid-btn{padding:5px 14px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--bg);color:var(--text2);font-family:inherit;margin-right:8px;}
.paid-btn.paid{background:#e8f5e9;color:#2e7d32;border-color:#2e7d32;}
.settle-paid{background:#e8f5e9!important;border-color:#2e7d32!important;}

/* ── Mobile ── */
@media(max-width:768px){
  .layout{grid-template-columns:1fr;}
  .sidebar{display:none;}
  .mob-nav{display:flex!important;}
  .main{padding-bottom:60px;}

  /* grids */
  .grid4{grid-template-columns:1fr 1fr;}
  .grid3{grid-template-columns:1fr 1fr;}
  .grid2{grid-template-columns:1fr;}
  .year-grid{grid-template-columns:repeat(2,1fr);}
  .income-grid{grid-template-columns:1fr;}

  /* forms → single column */
  .fr5{grid-template-columns:1fr;}
  .fr3{grid-template-columns:1fr;}

function sub(e){ return e.qty * e.price; }
function total(e){ return sub(e) + (e.gst||0) + (e.pst||0); }

function monthExp(mm){ return expenses.filter(e=>e.date.startsWith(currentYear+'-'+mm)); }
function monthInc(mm){ return incomes.filter(i=>i.date.startsWith(currentYear+'-'+mm)); }

/* ── Formula eval ── */
function evalFormula(expr){
  const s = expr.trim();
  if(!s) return null;
  if(!/^[\d\s\+\-\*\/\.\(\)]+$/.test(s)) return null;
  try{ const v = Function('"use strict";return ('+s+')')(); return isFinite(v)?+v.toFixed(4):null; }
  catch(e){ return null; }
}

/* ── Settle calc ── */
function calcSettle(exps){
  let kaiBalance = 0;
  exps.forEach(e=>{
    const t = total(e);
    if(e.who==='kai'){
      if(e.paidBy==='kai') return;
      kaiBalance += t;
    } else if(e.who==='han'){
      if(e.paidBy==='han') return;
      kaiBalance -= t;
    } else {
      const half = t/2;
      if(e.paidBy==='kai') kaiBalance -= half;
      else kaiBalance += half;
    }
  });
  return kaiBalance;
}

/* ── Personal totals ── */
function personalTotals(exps){
  let kaiSpend=0, hanSpend=0, kaiPaid=0, hanPaid=0;
  exps.forEach(e=>{
    const t=total(e);
    if(e.who==='kai') kaiSpend+=t;
    else if(e.who==='han') hanSpend+=t;
    else { kaiSpend+=t/2; hanSpend+=t/2; }
    if(e.paidBy==='kai') kaiPaid+=t;
    else hanPaid+=t;
  });
  return {kaiSpend,hanSpend,kaiPaid,hanPaid};
}

/* ──────── Cumulative balance up to month mm ──────── */
function cumulativeTotals(mm){
  const months=['01','02','03','04','05','06','07','08','09','10','11','12'];
  const idx=months.indexOf(mm);
  let kaiInc=0,hanInc=0,kaiSpend=0,hanSpend=0,kaiExtraDeduct=0;
  months.slice(0,idx+1).forEach(m=>{
    const exps=monthExp(m),incs=monthInc(m);
    const pt=personalTotals(exps);
    kaiInc+=incs.filter(i=>i.who==='kai').reduce((s,i)=>s+i.amount,0);
    hanInc+=incs.filter(i=>i.who==='han').reduce((s,i)=>s+i.amount,0);
    kaiSpend+=pt.kaiSpend; hanSpend+=pt.hanSpend;
    // 個人消費（贍養費等）在實際支出裡已含，餘額公式需再扣一次
    if(m>='02'){
      kaiExtraDeduct+=exps.filter(e=>e.who==='kai'&&e.cat==='個人消費').reduce((s,e)=>s+total(e),0);
    }
  });
  return {kaiInc,hanInc,kaiSpend,hanSpend,kaiExtraDeduct};
}

/* ──────── Render Month ──────── */
function renderMonth(mm){
  const exps=monthExp(mm), incs=monthInc(mm);
  const {kaiSpend:kaiSpendM,hanSpend:hanSpendM}=personalTotals(exps);
  const settle=calcSettle(exps);
  const kaiOnlyM=exps.filter(e=>e.who==='kai').reduce((s,e)=>s+total(e),0);
  const sharedM=exps.filter(e=>e.who==='shared').reduce((s,e)=>s+total(e),0);
  const sharedHalfM=Math.floor(sharedM/2*100)/100;
  const kaiPersonalM=Math.round((kaiOnlyM+sharedHalfM)*100)/100;
  const hanPersonalM=settle<0?Math.round(-settle*100)/100:0;
  const kaiIncM=incs.filter(i=>i.who==='kai').reduce((s,i)=>s+i.amount,0);
  const hanIncM=incs.filter(i=>i.who==='han').reduce((s,i)=>s+i.amount,0);
  const kaiExtraM=mm>='02'?exps.filter(e=>e.who==='kai'&&e.cat==='個人消費').reduce((s,e)=>s+total(e),0):0;
  const kaiBalanceM=kaiIncM-kaiSpendM-kaiExtraM, hanBalanceM=hanIncM-hanSpendM;

  const {kaiInc,hanInc,kaiSpend,hanSpend,kaiExtraDeduct}=cumulativeTotals(mm);
  const kaiBalance=kaiInc-kaiSpend-kaiExtraDeduct, hanBalance=hanInc-hanSpend;

  const subEl=document.getElementById('sub-'+mm);
  if(subEl) subEl.textContent=`${exps.length} 筆支出 · 凱累計資產 ${fmtCad(kaiBalance)} · 涵累計資產 ${fmtCad(hanBalance)}`;

  document.getElementById('sum-'+mm).innerHTML=`
    <div class="card kai-card"><div class="card-label">凱 本月收入</div><div class="card-value kai">${fmtCad(kaiIncM)}</div><div class="card-sub">本月支出 ${fmtCad(kaiSpendM)}</div></div>
    <div class="card kai-card"><div class="card-label">凱 本月結餘</div><div class="card-value ${kaiBalanceM>=0?'green':'red'}">${fmtCad(kaiBalanceM)}</div><div class="card-sub">累計資產 ${fmtCad(kaiBalance)}</div></div>
    <div class="card han-card"><div class="card-label">涵 本月收入</div><div class="card-value han">${fmtCad(hanIncM)}</div><div class="card-sub">本月支出 ${fmtCad(hanSpendM)}</div></div>
    <div class="card han-card"><div class="card-label">涵 本月結餘</div><div class="card-value ${hanBalanceM>=0?'green':'red'}">${fmtCad(hanBalanceM)}</div><div class="card-sub">累計資產 ${fmtCad(hanBalance)}</div></div>
  `;

  const settleEl=document.getElementById('settle-'+mm);
  const isPaid=localStorage.getItem('hh_spaid_'+currentYear+'_'+mm)==='1';
  const paidBtn=`<button class="paid-btn${isPaid?' paid':''}" onclick="markSettlePaid('${mm}')">${isPaid?'💚 涵已還清':'○ 標記涵已還款'}</button>`;
  const spendBreakdown=`
  <div class="spend-breakdown">
    <div class="sb-row">
      <span class="sb-label kai-txt">凱 個人支出</span>
      <span class="sb-val mono">${fmtCad(kaiPersonalM)}</span>
      <span class="sb-label han-txt" style="margin-left:1.5rem">涵 個人支出</span>
      <span class="sb-val mono">${fmtCad(hanPersonalM)}</span>
      <span class="sb-label" style="margin-left:1.5rem;color:var(--text2)">共同支出</span>
      <span class="sb-val mono" style="color:var(--text2)">${fmtCad(sharedM)} <small>(各 ${fmtCad(sharedM/2)})</small></span>
    </div>
  </div>`;
  if(Math.abs(settle)<0.01){
    settleEl.innerHTML=`<div class="settle-box"><div class="settle-icon">✅</div><div><div class="settle-text">本月帳目已平！兩人不需要互轉錢。</div></div></div>${spendBreakdown}`;
  } else if(settle>0){
    settleEl.innerHTML=`<div class="settle-box"><div class="settle-icon">💸</div><div style="flex:1"><div class="settle-text">本月結算：<b>凱</b> 需轉給 <b>涵</b></div><div class="settle-amount">${fmtCad(settle)}</div></div></div>${spendBreakdown}`;
  } else {
    settleEl.innerHTML=`<div class="settle-box${isPaid?' settle-paid':''}"><div class="settle-icon">${isPaid?'✅':'💸'}</div><div style="flex:1"><div class="settle-text">${isPaid?'已還清：<b>涵</b> → <b>凱</b>':'本月結算：<b>涵</b> 需轉給 <b>凱</b>'}</div><div class="settle-amount">${fmtCad(-settle)}</div></div>${paidBtn}</div>${spendBreakdown}`;

  ['kai','han'].forEach(who=>{
    const list=incs.filter(i=>i.who===who);

  });

  const tbody=document.getElementById('tbl-'+mm);
  const empty=document.getElementById('empty-'+mm);

  const gstTotal=exps.filter(e=>e.cat==='GST').reduce((s,e)=>s+total(e),0);
  const pstTotal=exps.filter(e=>e.cat==='PST').reduce((s,e)=>s+total(e),0);

  else{

    tbody.innerHTML=[...exps].sort((a,b)=>b.date.localeCompare(a.date)||b.id-a.id).map(e=>{
      const whoLabel=e.who==='kai'?`<span class="who-chip who-kai">凱的</span>`

      const paidLabel=e.paidBy==='kai'?`<span class="who-chip who-kai">凱付</span>`:`<span class="who-chip who-han">涵付</span>`;
      return `<tr>
        <td>${e.date}</td>
        <td style="font-weight:500">${e.name}${e.note?'<br><span style="font-size:11px;color:var(--text3)">'+e.note+'</span>':''}</td>

      <tr class="tbl-grand"><td colspan="9" style="text-align:right;padding-right:14px">月支出合計</td><td class="mono">${fmtCad(allTotal)}</td><td></td></tr>`;

    <div class="bar-row"><div class="bar-cat">${c}</div>
    <div class="bar-track"><div class="bar-fill" style="width:${(v/mx*100).toFixed(1)}%;background:${BAR_COLOR[c]||'#888'}"></div></div>

/* ──────── Year Switch ──────── */
function switchYear(delta){
  saveExp(); saveInc();
  currentYear += delta;
  localStorage.setItem('hh_cur_year', currentYear);
  const stored_e = localStorage.getItem('hh_exp_'+currentYear);
  const stored_i = localStorage.getItem('hh_inc_'+currentYear);
  expenses = JSON.parse(stored_e||'null') || (currentYear===2026 ? expenses : []);
  if(currentYear===2026 && !stored_e) expenses = JSON.parse(localStorage.getItem('hh_exp_2026')||'null') || expenses;
  incomes  = JSON.parse(stored_i||'null') || (currentYear===2026 ? incomes : []);
  if(currentYear===2026 && !stored_i) incomes = JSON.parse(localStorage.getItem('hh_inc_2026')||'null') || incomes;
  nextExpId = expenses.length ? Math.max(...expenses.map(e=>e.id))+1 : 1;
  nextIncId = incomes.length ? Math.max(...incomes.map(i=>i.id))+1 : 1;
  document.getElementById('hdr-year').textContent = currentYear;
  document.title = '凱 & 涵 家庭帳本 '+currentYear;
  // Re-render all panels
  ['01','02','03','04','05','06','07','08','09','10','11','12'].forEach(m=>{
    const p=document.getElementById('panel-m'+m);
    if(p) p.innerHTML='';
  });
  showPanel('year', document.querySelector('.nav-item'));
  renderYear();
  showToast(currentYear+' 年資料已載入');
}

/* ──────── Search ──────── */
function filterTable(mm, q){
  const tbody=document.getElementById('tbl-'+mm);
  if(!tbody)return;
  const rows=tbody.querySelectorAll('tr:not(.tbl-sub):not(.tbl-grand)');
  const kw=q.trim().toLowerCase();
  rows.forEach(tr=>{tr.style.display=(!kw||tr.textContent.toLowerCase().includes(kw))?'':'none';});
}

/* ──────── Settlement Mark ──────── */
function toggleSettled(mm){
  const cur=localStorage.getItem('hh_settled_'+mm)==='1';
  localStorage.setItem('hh_settled_'+mm, cur?'0':'1');
  renderMonth(mm);
  showToast(cur?'已取消結算標記':'✅ 已標記為結算完成');
}

function markSettlePaid(mm){
  const paidKey='hh_spaid_'+currentYear+'_'+mm;
  const paidIdKey='hh_spaid_id_'+currentYear+'_'+mm;
  const isPaid=localStorage.getItem(paidKey)==='1';
  if(isPaid){
    // 取消還款：移除那筆收入
    const id=parseInt(localStorage.getItem(paidIdKey));
    incomes=incomes.filter(i=>i.id!==id);
    localStorage.removeItem(paidKey);
    localStorage.removeItem(paidIdKey);
    saveInc();
    showToast('已取消還款標記');
  } else {
    // 標記已還款：幫凱新增一筆收入
    const settle=calcSettle(monthExp(mm));
    if(settle>=0) return;
    const amount=Math.round(-settle*100)/100;
    const lastDay=new Date(currentYear,parseInt(mm),0).toISOString().slice(0,10);
    const id=nextIncId++;
    incomes.push({id,date:lastDay,source:'涵還款',who:'kai',amount});
    localStorage.setItem(paidKey,'1');
    localStorage.setItem(paidIdKey,String(id));
    saveInc();
    showToast('✅ 已記錄還款 '+fmtCad(amount));
  }
  renderMonth(mm);
  renderYear();
}

/* ──────── Calendar View ──────── */
const _calOpenDay={};

function switchView(mm, mode){
  const listEl=document.getElementById('list-view-'+mm);
  const calEl=document.getElementById('cal-view-'+mm);
  const btnList=document.getElementById('btn-list-'+mm);
  const btnCal=document.getElementById('btn-cal-'+mm);
  if(mode==='cal'){
    listEl.style.display='none';calEl.style.display='block';
    btnList.classList.remove('active');btnCal.classList.add('active');
    renderCalendar(mm);
  } else {
    listEl.style.display='block';calEl.style.display='none';
    btnList.classList.add('active');btnCal.classList.remove('active');
  }
}

function renderCalendar(mm){
  const exps=monthExp(mm);
  const year=2026, month=parseInt(mm,10)-1;
  const today=new Date();

  // Group expenses by day
  const byDay={};
  exps.forEach(e=>{
    const d=e.date.slice(8); // dd
    if(!byDay[d])byDay[d]=[];
    byDay[d].push(e);
  });

  const firstDay=new Date(year,month,1).getDay(); // 0=Sun
  const daysInMonth=new Date(year,month+1,0).getDate();
  // Start week on Monday: shift so Mon=0
  const startOffset=(firstDay+6)%7;

  const weekdays=['一','二','三','四','五','六','日'];
  let html=weekdays.map(d=>`<div class="cal-weekday">${d}</div>`).join('');

  // Empty cells before first day
  for(let i=0;i<startOffset;i++) html+=`<div class="cal-cell empty"></div>`;

  for(let d=1;d<=daysInMonth;d++){
    const dd=String(d).padStart(2,'0');
    const items=byDay[dd]||[];
    const dayTotal=items.reduce((s,e)=>s+total(e),0);
    const isToday=today.getFullYear()===year&&today.getMonth()===month&&today.getDate()===d;
    const hasExp=items.length>0;
    const cellClass=`cal-cell${isToday?' today':''}${hasExp?' has-exp':''}`;
    const dots=items.slice(0,3).map(e=>`<div class="cal-day-dot">${e.name}</div>`).join('');
    html+=`<div class="${cellClass}" onclick="${hasExp?`toggleCalDay('${mm}','${dd}',this)`:''}" data-day="${dd}">
      <div class="cal-day-num">${d}</div>
      ${hasExp?`<div class="cal-day-total">${fmtCad(dayTotal)}</div><div class="cal-day-items">${dots}</div>`:''}
    </div>`;
  }

  document.getElementById('cal-grid-'+mm).innerHTML=html;
  document.getElementById('cal-popup-'+mm).innerHTML='';
  _calOpenDay[mm]=null;
}

function toggleCalDay(mm, dd, cell){
  const popupEl=document.getElementById('cal-popup-'+mm);
  if(_calOpenDay[mm]===dd){
    popupEl.innerHTML='';
    _calOpenDay[mm]=null;
    return;
  }
  _calOpenDay[mm]=dd;
  const exps=monthExp(mm).filter(e=>e.date.slice(8)===dd).sort((a,b)=>b.id-a.id);
  const dayTotal=exps.reduce((s,e)=>s+total(e),0);
  const rows=exps.map(e=>{
    const whoLabel=e.who==='kai'?'凱':e.who==='han'?'涵':'共';
    return `<div class="cal-popup-row">
      <span class="cal-popup-name">${e.name}<span style="color:var(--text3);font-size:10px;margin-left:4px">[${whoLabel}]</span></span>
      <span class="cal-popup-amt">${fmtCad(total(e))}</span>
    </div>`;
  }).join('');
  popupEl.innerHTML=`<div class="cal-popup">
    <div class="cal-popup-title">📅 ${parseInt(mm)}月${parseInt(dd)}日 · 合計 ${fmtCad(dayTotal)}</div>
    ${rows}
  </div>`;
}

/* ──────── Trend Chart ──────── */
function renderTrendChart(){
  const el=document.getElementById('year-trend-chart');
  if(!el)return;
  const W=800,H=200,PL=14,PR=14,PT=32,PB=28;
  const chartW=W-PL-PR, chartH=H-PT-PB;
  const data=MONTHS.map(mm=>{
    const {kaiInc,hanInc,kaiSpend,hanSpend,kaiExtraDeduct}=cumulativeTotals(mm);
    const hasData=monthExp(mm).length>0||monthInc(mm).length>0;
    return{mm,kai:kaiInc-kaiSpend-kaiExtraDeduct,han:hanInc-hanSpend,hasData};
  });
  const lastIdx=data.reduce((l,d,i)=>d.hasData?i:l,-1);
  if(lastIdx<0){el.innerHTML='<div class="empty-state" style="padding:2rem">尚無資料</div>';return;}
  const active=data.slice(0,lastIdx+1);
  const allV=active.flatMap(d=>[d.kai,d.han]);
  const minV=Math.min(...allV), maxV=Math.max(...allV);
  const pad=(maxV-minV)*0.18||1000;
  const yMin=minV-pad*0.3, yMax=maxV+pad;
  const n=active.length;
  const xStep=n>1?chartW/(n-1):0;
  const tx=i=>PL+(n>1?i*xStep:chartW/2);
  const ty=v=>PT+chartH-((v-yMin)/(yMax-yMin))*chartH;
  const bottom=PT+chartH;

  // smooth bezier path
  function smoothPath(pts){
    if(pts.length===1) return `M${pts[0][0]},${pts[0][1]}`;
    let d=`M${pts[0][0]},${pts[0][1]}`;
    for(let i=0;i<pts.length-1;i++){
      const mx=(pts[i][0]+pts[i+1][0])/2;
      d+=` C${mx},${pts[i][1]} ${mx},${pts[i+1][1]} ${pts[i+1][0]},${pts[i+1][1]}`;
    }
    return d;
  }
  function areaPath(pts,col){
    const line=smoothPath(pts);
    const area=line+` L${pts[pts.length-1][0]},${bottom} L${pts[0][0]},${bottom} Z`;
    return area;
  }

  const kaiPts=active.map((_,i)=>[tx(i),ty(active[i].kai)]);
  const hanPts=active.map((_,i)=>[tx(i),ty(active[i].han)]);

  // grid lines (horizontal only, subtle)
  let grid='';
  for(let i=0;i<=3;i++){
    const y=PT+chartH*(i/3);
    grid+=`<line x1="${PL}" y1="${y.toFixed(1)}" x2="${W-PR}" y2="${y.toFixed(1)}" stroke="var(--border)" stroke-width="1" stroke-dasharray="3,3"/>`;
  }

  // x labels
  let xlbl='';
  active.forEach((_,i)=>{
    xlbl+=`<text x="${tx(i).toFixed(1)}" y="${H-8}" text-anchor="middle" font-size="10" fill="var(--text3)">${MN[parseInt(active[i].mm)-1].replace('月','')}</text>`;
  });

  // value labels above each dot
  let labels='';

    const hlbl=Math.abs(d.han)>=1000?(d.han/1000).toFixed(1)+'k':d.han.toFixed(0);
    labels+=`<text x="${kx.toFixed(1)}" y="${(ky-10).toFixed(1)}" text-anchor="middle" font-size="10" font-weight="600" fill="var(--kai)">${klbl}</text>`;
    labels+=`<text x="${hx.toFixed(1)}" y="${(hy+18).toFixed(1)}" text-anchor="middle" font-size="10" font-weight="600" fill="var(--han)">${hlbl}</text>`;
  });

  // dots
  let dots='';
  active.forEach((d,i)=>{
    dots+=`<circle cx="${tx(i).toFixed(1)}" cy="${ty(d.kai).toFixed(1)}" r="4" fill="var(--kai)" stroke="white" stroke-width="2"/>`;
    dots+=`<circle cx="${tx(i).toFixed(1)}" cy="${ty(d.han).toFixed(1)}" r="4" fill="var(--han)" stroke="white" stroke-width="2"/>`;
  });

  el.innerHTML=`
  <svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto;display:block;border-radius:8px">
    ${grid}
    <path d="${smoothPath(hanPts)}" fill="none" stroke="var(--han)" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
    <path d="${smoothPath(kaiPts)}" fill="none" stroke="var(--kai)" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
    ${labels}${dots}${xlbl}
  </svg>`;
}

/* ──────── Donut Charts ──────── */
function renderDonutCharts(){
  const el=document.getElementById('year-donuts');
  if(!el)return;
  const COLORS=['#4A9EE0','#63B995','#E8875A','#B67FD4','#E06B6B','#E8C25A','#6BC4E0','#9E7BD4','#88BBAA','#D4B870'];

  function donutSVG(who,expMap){
    const entries=Object.entries(expMap).filter(([,v])=>v>0.01).sort((a,b)=>b[1]-a[1]);
    const sum=entries.reduce((s,[,v])=>s+v,0);
    if(!entries.length) return'<div class="empty-state" style="padding:2rem;font-size:12px">尚無支出</div>';
    const cx=100,cy=88,R=68,r=42;
    let ang=-Math.PI/2, arcs='';
    entries.forEach(([,val],i)=>{
      const a=(val/sum)*2*Math.PI, end=ang+a, lg=a>Math.PI?1:0;
      const p=(θ,rd)=>[cx+rd*Math.cos(θ),cy+rd*Math.sin(θ)];
      const[x1,y1]=p(ang,R),[x2,y2]=p(end,R),[x3,y3]=p(end,r),[x4,y4]=p(ang,r);
      arcs+=`<path d="M${x1.toFixed(1)},${y1.toFixed(1)} A${R},${R} 0 ${lg} 1 ${x2.toFixed(1)},${y2.toFixed(1)} L${x3.toFixed(1)},${y3.toFixed(1)} A${r},${r} 0 ${lg} 0 ${x4.toFixed(1)},${y4.toFixed(1)} Z" fill="${COLORS[i%COLORS.length]}"/>`;
      ang=end;
    });
    const totalStr=sum>=1000?(sum/1000).toFixed(1)+'k':sum.toFixed(0);
    const legend=entries.slice(0,5).map(([cat,val],i)=>`
      <div style="display:flex;align-items:center;gap:4px;font-size:10px;color:var(--text2);min-width:0">
        <span style="width:7px;height:7px;border-radius:50%;background:${COLORS[i%COLORS.length]};flex-shrink:0"></span>
        <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${cat}</span>
        <span style="color:var(--text3);font-family:monospace;font-size:9px;flex-shrink:0">${val>=1000?(val/1000).toFixed(1)+'k':val.toFixed(0)}</span>
        <span style="color:var(--text3);font-family:monospace;font-size:9px;flex-shrink:0">${sum>0?(val/sum*100).toFixed(1)+'%':''}</span>
      </div>`).join('');
    const ac=who==='kai'?'#378ADD':'#993556', name=who==='kai'?'凱':'涵';
    return`<div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 12px">
      <div style="font-size:10px;font-weight:700;color:var(--text3);margin-bottom:4px;display:flex;align-items:center;gap:5px">
        <span style="width:16px;height:16px;border-radius:50%;background:${ac};display:inline-flex;align-items:center;justify-content:center;color:#fff;font-size:9px;font-weight:700">${name}</span>年支出
      </div>
      <svg viewBox="0 0 200 176" style="width:100%;height:auto;display:block">
        ${arcs}
        <text x="100" y="83" text-anchor="middle" font-size="15" font-weight="700" fill="var(--text)">${totalStr}</text>
        <text x="100" y="98" text-anchor="middle" font-size="8" fill="var(--text3)">年支出合計</text>
      </svg>
      <div style="display:flex;flex-direction:column;gap:3px">${legend}</div>
    </div>`;
  }

  const kaiMap={}, hanMap={};
  expenses.forEach(e=>{
    const t=total(e);
    if(e.who==='kai') kaiMap[e.cat]=(kaiMap[e.cat]||0)+t;
    else if(e.who==='han') hanMap[e.cat]=(hanMap[e.cat]||0)+t;
    else{ kaiMap[e.cat]=(kaiMap[e.cat]||0)+t/2; hanMap[e.cat]=(hanMap[e.cat]||0)+t/2; }
  });

  el.innerHTML=donutSVG('kai',kaiMap)+donutSVG('han',hanMap);
}

/* ──────── Render Year ──────── */
function renderYear(){
  const yt=document.getElementById('year-title');
  if(yt) yt.textContent=currentYear+' 年度總覽';
  document.getElementById('hdr-year').textContent=currentYear;
  const allExps=expenses, allIncs=incomes;
  const {kaiSpend,hanSpend}=personalTotals(allExps);
  const kaiInc=allIncs.filter(i=>i.who==='kai').reduce((s,i)=>s+i.amount,0);
  const hanInc=allIncs.filter(i=>i.who==='han').reduce((s,i)=>s+i.amount,0);
  const kaiExtraDeduct=allExps.filter(e=>e.date.slice(5,7)>='02'&&e.who==='kai'&&e.cat==='個人消費').reduce((s,e)=>s+total(e),0);
  const settle=calcSettle(allExps);

  document.getElementById('year-summary').innerHTML=`
    <div class="card kai-card"><div class="card-label">凱 全年餘額</div><div class="card-value ${(kaiInc-kaiSpend-kaiExtraDeduct)>=0?'green':'red'}">${fmtCad(kaiInc-kaiSpend-kaiExtraDeduct)}</div><div class="card-sub">收入 ${fmtCad(kaiInc)} · 支出 ${fmtCad(kaiSpend)}</div></div>
    <div class="card han-card"><div class="card-label">涵 全年餘額</div><div class="card-value ${(hanInc-hanSpend)>=0?'green':'red'}">${fmtCad(hanInc-hanSpend)}</div><div class="card-sub">收入 ${fmtCad(hanInc)} · 支出 ${fmtCad(hanSpend)}</div></div>
    <div class="card"><div class="card-label">家庭總收入</div><div class="card-value green">${fmtCad(kaiInc+hanInc)}</div><div class="card-sub">凱+涵合計</div></div>
    <div class="card"><div class="card-label">家庭總支出</div><div class="card-value red">${fmtCad(allExps.reduce((s,e)=>s+total(e),0))}</div><div class="card-sub">所有費用合計</div></div>
  `;

  // 已還款月份加總
  const totalPaid=MONTHS.reduce((s,m)=>{
    if(localStorage.getItem('hh_spaid_'+currentYear+'_'+m)!=='1') return s;
    const ms=calcSettle(monthExp(m));
    return s+(ms<0?Math.round(-ms*100)/100:0);
  },0);
  // 未還月份直接加總（避免浮點誤差）
  const outstanding=MONTHS.reduce((s,m)=>{
    if(localStorage.getItem('hh_spaid_'+currentYear+'_'+m)==='1') return s;
    const ms=calcSettle(monthExp(m));
    return s+(ms<0?Math.round(-ms*100)/100:0);
  },0);

  const settleEl=document.getElementById('year-settle');
  if(Math.abs(settle)<0.01){
    settleEl.innerHTML=`<div class="settle-box" style="margin-bottom:1.5rem"><div class="settle-icon">✅</div><div class="settle-text">全年帳目已平！</div></div>`;
  } else if(settle>0){
    settleEl.innerHTML=`<div class="settle-box" style="margin-bottom:1.5rem"><div class="settle-icon">💸</div><div><div class="settle-text">全年累計：<b>凱</b> 尚欠 <b>涵</b></div><div class="settle-amount">${fmtCad(settle)}</div></div></div>`;
  } else if(outstanding<=0){
    settleEl.innerHTML=`<div class="settle-box" style="margin-bottom:1.5rem;background:var(--green-light);border-color:var(--green)"><div class="settle-icon">✅</div><div><div class="settle-text">全年已全數還清！涵共還凱 ${fmtCad(totalPaid)}</div></div></div>`;
  } else {
    settleEl.innerHTML=`<div class="settle-box" style="margin-bottom:1.5rem"><div class="settle-icon">💸</div><div><div class="settle-text">全年累計：<b>涵</b> 尚欠 <b>凱</b></div><div class="settle-amount">${fmtCad(outstanding)}</div><div style="font-size:12px;color:var(--text2);margin-top:4px">已還 ${fmtCad(totalPaid)} · 原始 ${fmtCad(-settle)}</div></div></div>`;
  }

  renderTrendChart();
  renderDonutCharts();

  const mt=MONTHS.map(mm=>{
    const e=monthExp(mm),i=monthInc(mm);
    const t=e.reduce((s,x)=>s+total(x),0);
    return{mm,exps:e,t};
  });
  const maxT=Math.max(...mt.map(m=>m.t),1);
  document.getElementById('year-months').innerHTML=mt.map(({mm,exps,t})=>`
    <div class="month-card" onclick="showPanelByMonth('${mm}')">
      <div class="month-card-name">${MN[parseInt(mm)-1]}</div>
      <div class="month-card-total">${t>0?fmtCad(t):'—'}</div>
      <div class="month-card-sub">${exps.length?exps.length+' 筆':'尚無記錄'}</div>
      <div class="month-card-bar"><div class="month-card-bar-fill" style="width:${(t/maxT*100).toFixed(1)}%"></div></div>
    </div>`).join('');

  const bycat={};
  expenses.forEach(e=>{bycat[e.cat]=(bycat[e.cat]||0)+total(e);});
  const sc=Object.entries(bycat).sort((a,b)=>b[1]-a[1]);
  const mx=sc.length?sc[0][1]:1;
  document.getElementById('year-bar').innerHTML=sc.map(([c,v])=>`
    <div class="bar-row"><div class="bar-cat">${c}</div>
    <div class="bar-track"><div class="bar-fill" style="width:${(v/mx*100).toFixed(1)}%;background:${BAR_COLOR[c]||'#888'}"></div></div>
    <div class="bar-val">${fmtCad(v)}</div></div>`).join('')||'<div class="empty-state">尚無資料</div>';
  document.getElementById('year-cats').innerHTML=sc.map(([c,v])=>`
    <div class="cat-item"><span style="color:var(--text2)">${c}</span><span class="cat-amt">${fmtCad(v)}</span></div>`).join('');
}

/* ──────── Add / Delete ──────── */
function addExpense(mm){
  const date=document.getElementById('fd-'+mm).value;
  const name=document.getElementById('fn-'+mm).value.trim();
  const qty=parseFloat(document.getElementById('fq-'+mm).value)||1;
  const priceExpr=document.getElementById('fp-'+mm).value.trim();
  const cat=document.getElementById('fc-'+mm).value;
  const who=expWhoState[mm]||'shared';
  const paidBy=expPaidState[mm]||'kai';
  const gstExpr=document.getElementById('fg-'+mm).value.trim();
  const pstExpr=document.getElementById('fpst-'+mm).value.trim();
  const note=document.getElementById('fo-'+mm).value.trim();

  if(!date){showToast('⚠ 請填寫日期');return;}
  if(!date.startsWith(currentYear+'-'+mm)){showToast('⚠ 日期不在本月範圍');return;}
  const gst=evalFormula(gstExpr)||0;
  const pst=evalFormula(pstExpr)||0;
  const hasMain=name&&priceExpr;
  if(!hasMain&&gst===0&&pst===0){showToast('⚠ 請填寫項目名稱和金額');return;}

  let added=[];
  if(hasMain){
    const price=evalFormula(priceExpr);
    if(price===null||price<=0){showToast('⚠ 金額格式錯誤');return;}
    expenses.push({id:nextExpId++,date,name,qty,priceExpr,price,cat,who,paidBy,gst:0,pst:0,note});
    added.push(name);
  }
  if(gst>0){
    expenses.push({id:nextExpId++,date,name:'GST',qty:1,priceExpr:String(gst),price:gst,cat:'GST',who,paidBy,gst:0,pst:0,note:''});
    added.push('GST '+fmtCad(gst));
  }
  if(pst>0){
    expenses.push({id:nextExpId++,date,name:'PST',qty:1,priceExpr:String(pst),price:pst,cat:'PST',who,paidBy,gst:0,pst:0,note:''});
    added.push('PST '+fmtCad(pst));
  }
  saveExp();clearExpForm(mm);renderMonth(mm);renderYear();
  showToast('✓ 已新增：'+added.join('、'));
}

function addIncome(mm){
  const date=document.getElementById('ifd-'+mm).value;
  const source=document.getElementById('ifn-'+mm).value.trim();
  const amtExpr=document.getElementById('ifa-'+mm).value.trim();
  const who=incWhoState[mm]||'kai';
  if(!date||!source||!amtExpr){showToast('⚠ 請填寫日期、來源和金額');return;}
  const amount=evalFormula(amtExpr);
  if(amount===null||amount<=0){showToast('⚠ 金額格式錯誤');return;}
  incomes.push({id:nextIncId++,date,source,amount,who});
  saveInc();
  document.getElementById('ifn-'+mm).value='';
  document.getElementById('ifa-'+mm).value='';
  document.getElementById('ifh-'+mm).textContent='';
  renderMonth(mm);renderYear();
  showToast('✓ 已新增：'+source+' '+fmtCad(amount));
}

/* ──────── Formula live hint ──────── */
function bindFormulaHint(inputId, hintId){
  const inp = document.getElementById(inputId);
  const hint = document.getElementById(hintId);
  if(!inp||!hint) return;
  inp.addEventListener('input',()=>{
    const v=evalFormula(inp.value);
    if(!inp.value.trim()){hint.textContent='';return;}
    if(v!==null){hint.textContent='= CAD '+v.toFixed(2);hint.className='formula-hint';}
    else{hint.textContent='格式錯誤';hint.className='formula-hint err';}
  });
}

/* ──────── Cloud Sync ──────── */
function getSyncUrl(){
  let url=localStorage.getItem('hh_sync_url')||'';
  if(!url){
    url=(prompt('請貼上你的 Google Apps Script Web App 網址：')||'').trim();
    if(url){localStorage.setItem('hh_sync_url',url);}
  }
  return url;
}

function collectData(){
  const data={};
  for(let i=0;i<localStorage.length;i++){
    const k=localStorage.key(i);
    if(k==='hh_cats'||k==='hh_cur_year'||k==='hh_sync_url'||
       k.startsWith('hh_exp_')||k.startsWith('hh_inc_')||
       k.startsWith('hh_spaid_')||k.startsWith('hh_settled_')){
      data[k]=localStorage.getItem(k);
    }
  }
  return data;
}

async function cloudSync(){
  const url=getSyncUrl();
  if(!url){showToast('❌ 未設定同步網址');return;}
  const btn=document.getElementById('sync-btn');
  btn.textContent='☁️ 上傳中...';
  try{
    const CHUNK=8000;
    const raw=collectData();
    const data={};
    for(const k in raw){
      const val=String(raw[k]||'');
      if(val.length<=CHUNK){
        data[k]=val;
      } else {
        const chunks=[];
        for(let i=0;i<val.length;i+=CHUNK) chunks.push(val.slice(i,i+CHUNK));
        data[k]=chunks[0];
        for(let i=1;i<chunks.length;i++) data[k+'__'+i]=chunks[i];
      }
    }
    const res=await fetch(url,{
      method:'POST',
      body:JSON.stringify({action:'setAll',data}),
      headers:{'Content-Type':'text/plain'}
    });
    const json=await res.json();
    if(json.ok){showToast('✓ 雲端同步完成！');}
    else{showToast('❌ 同步失敗：'+(json.error||''));}
  }catch(err){
    showToast('❌ 網路錯誤，請確認設定');
    console.error(err);
  }
  btn.innerHTML='<div class="nav-dot"></div>☁️ 雲端同步';
}

async function cloudLoad(){
  const url=getSyncUrl();
  if(!url){showToast('❌ 未設定同步網址');return;}
  if(!confirm('從雲端載入資料？本機資料將被覆蓋。'))return;
  const btn=document.getElementById('load-btn');
  btn.textContent='⬇️ 載入中...';
  try{
    const res=await fetch(url+'?t='+Date.now());
    const json=await res.json();
    if(json.ok && json.data){
      Object.keys(json.data).forEach(k=>{
        if(k!=='hh_sync_url') localStorage.setItem(k,json.data[k]);
      });
      showToast('✓ 載入成功，重新整理中...');
      setTimeout(()=>location.reload(),1000);
    }else{
      showToast('❌ 載入失敗：'+json.error);
    }
  }catch(err){
    showToast('❌ 網路錯誤，請確認設定');
    console.error(err);
  }
  btn.innerHTML='<div class="nav-dot"></div>⬇️ 從雲端載入';
}

function exportJSON(){
  const today=new Date().toISOString().slice(0,10);
  const data={};
  // 收集所有相關 key
  for(let i=0;i<localStorage.length;i++){
    const k=localStorage.key(i);
    if(k==='hh_cats'||k==='hh_cur_year'||
       k.startsWith('hh_exp_')||k.startsWith('hh_inc_')||
       k.startsWith('hh_spaid_')||k.startsWith('hh_settled_')){
      data[k]=localStorage.getItem(k);
    }
  }
  const json=JSON.stringify(data,null,2);
  const blob=new Blob([json],{type:'application/json;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=`家庭帳本_${today}.json`;a.click();
  URL.revokeObjectURL(url);
  showToast('✓ 資料已匯出');
}

function importJSON(input){
  const file=input.files[0];
  if(!file)return;
  if(!confirm('確定要匯入？現有資料將被覆蓋。'))return;
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      const data=JSON.parse(e.target.result);
      Object.keys(data).forEach(k=>localStorage.setItem(k,data[k]));
      showToast('✓ 匯入成功，重新整理中...');
      setTimeout(()=>location.reload(),1000);
    }catch(err){
      alert('匯入失敗：JSON 格式錯誤');
    }
  };
  reader.readAsText(file);
}

  const a=document.createElement('a');a.href=url;a.download=fn;a.click();
  URL.revokeObjectURL(url);showToast('✓ CSV 已匯出');
}

// 從帳本統計常買品項（排除外食類）
function getFrequentItems() {
  const freq = {};
  // 排除的品項名稱（不是超市採買的）
  const DEAL_EXCLUDE_NAMES = ['電子菸', '菸', '煙', 'vape', 'GST', 'PST'];
  // 只保留真正超市採買的分類
  const DEAL_INCLUDE_CATS = ['咖啡', '日用品', '牛奶', '牛奶/奶製品', '米/麵/泡麵/麵包', '肉類', '蔬菜', '調味料', '雞蛋', '零食', '飲料'];
  expenses.forEach(e => {
    if (!DEAL_INCLUDE_CATS.some(c => (e.cat||'').includes(c))) return;
    const key = e.name.trim();
    if (!key) return;
    if (DEAL_EXCLUDE_NAMES.some(n => key.includes(n))) return;
    freq[key] = (freq[key] || 0) + 1;
  });
  return Object.entries(freq)
    .filter(([,v]) => v >= 2)
    .sort((a,b) => b[1]-a[1])
    .slice(0, 60)
    .map(([k]) => k.trim());
}

// 比對 grocery DEALS 陣列和帳本常買品項
function matchDeals(deals, freqItems) {
  return deals.filter(d => {
    const zhLabel = (d.zh_label || '').trim();
    if (!zhLabel) return false;
    return freqItems.some(item => {
      if (!item || item.length < 1) return false;
      // 直接包含比對：帳本品項包含 zh_label，或 zh_label 包含帳本品項
      return item.includes(zhLabel) || zhLabel.includes(item);
    });
  });
}

// 從 Flipp API 抓單一關鍵字的特價
async function fetchFlippItems(query) {
  try {
    const res = await fetch(FLIPP_API + encodeURIComponent(query));
    const data = await res.json();
    return (data.items || []).map(d => ({
      name: d.name || '',
      price: d.current_price,
      original: d.original_price,
      savings_pct: d.original_price && d.current_price ? Math.round((1 - d.current_price / d.original_price) * 100) : null,
      store: d.merchant_name || '',
      zh_label: '',
    }));
  } catch(e) {
    return [];
  }
}

async function loadDeals() {
  if (dealData) return dealData;
  // 用 MY_RULES 裡的 en 關鍵字去 Flipp API 查詢
  const queries = [...new Set(MY_RULES.map(r => r.en))];
  const all = await Promise.all(queries.map(q => fetchFlippItems(q)));
  dealData = all.flat();
  return dealData;
}

  const byStore = {};

// 把帳本品項名稱轉換成 grocery zh_label 可比對的詞
function expandAliases(items) {
  const expanded = new Set(items);
  items.forEach(item => {
    // 直接對照
    if (ZH_ALIAS[item]) expanded.add(ZH_ALIAS[item]);
    // 部分包含對照
    Object.entries(ZH_ALIAS).forEach(([tw, hk]) => {
      if (item.includes(tw)) expanded.add(hk);
    });
  });
  return [...expanded];
}

function dealMatch(deals, freqItems) {
  const allItems = expandAliases(freqItems);
  return deals.filter(d => {
    const z = (d.zh_label||'').trim();
    if (!z) return false;
    return allItems.some(item => item.includes(z) || z.includes(item));
  });
}

  { match:'雲吞',      stores:['PriceSmart 佳廉'],                    threshold:null,  en:'Foongs Kitchen wonton', note:'佳廉Foongs Kitchen牌' },
  { match:'爆米花',    stores:['Walmart'],                            threshold:null,  en:'orville redenbacher popcorn', note:'Walmart買' },
  { match:'咖啡',      stores:['Walmart','Real Canadian Superstore'], threshold:20.00, en:'ground coffee',       note:'低於$20才提醒，要是咖啡粉/豆不是咖啡機' },
  { match:'麵包',      stores:['Walmart','Real Canadian Superstore'], threshold:4.00,  en:'bread loaf',          note:'低於$4才提醒' },
];

// 用購買規則比對 deals（zh_label 或英文名都比對）
function matchDealsByRules(deals) {
  const results = [];
  MY_RULES.forEach(rule => {
    deals.forEach(d => {
      const z = (d.zh_label||'').trim();
      const n = (d.name||'').toLowerCase();
      // 英文 en 比對（用 en 裡的每個詞去比對商品英文名）
      const enWords = (rule.en||'').toLowerCase().split(' ').filter(w => w.length >= 3);
      const matchEn = enWords.length > 0 && enWords.every(w => n.includes(w));
      if (!matchEn) return;
      if (!rule.stores.some(s => (d.store||'').includes(s) || s.includes(d.store||''))) return;
      if (rule.threshold && d.price > rule.threshold) return;
      // 去重：同規則同超市只保留最便宜一筆
      const key = `${rule.match}_${d.store}`;
      const existing = results.find(r => r._key === key);
      if (!existing) {
        results.push({...d, _key: key, _rule: rule});
      } else if (d.price < existing.price) {
        Object.assign(existing, {...d, _key: key, _rule: rule});
      }
    });
  });
  return results;
}

async function initDealBar() {
  const deals = await loadDeals();
  if (!deals.length) return;
  const matched = matchDealsByRules(deals);
  if (matched.length === 0) return;
  document.getElementById('deal-count').textContent = matched.length;
  document.getElementById('deal-count2').textContent = matched.length;
  document.getElementById('deal-bar').classList.remove('hidden');
}

// 初始化（等帳本資料載入後執行）
window.addEventListener('load', () => {
  setTimeout(initDealBar, 800);
});
</script>
